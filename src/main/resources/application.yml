spring:
  application:
    name: oauth2-auth-server
  profiles:
    active: dev

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.company.authserver: INFO

app:
  jwt:
    issuer: ${APP_JWT_ISSUER:https://auth.company.com}
    audience: ${APP_JWT_AUDIENCE:https://api.company.com}
    expiry-seconds: ${APP_JWT_EXPIRY_SECONDS:3600}
